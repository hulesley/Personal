- http_request:
    name: 📺 BiliBili.Global.bangumi.play.html
    match: ^https?:\/\/www\.bilibili\.com\/bangumi\/play\/(ss|ep)\d+\/?
    script_url: https://github.com/BiliUniverse/Global/releases/download/v0.8.9/request.bundle.js
    arguments:
      _compat.$argument: ForceHost="{{{ForceHost}}}"&Locales="{{{Locales}}}"&Proxies.CHN="{{{Proxies.CHN}}}"&Proxies.HKG="{{{Proxies.HKG}}}"&Proxies.MAC="{{{Proxies.MAC}}}"&Proxies.TWN="{{{Proxies.TWN}}}"
