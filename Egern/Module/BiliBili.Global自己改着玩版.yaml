name: '📺 BiliBili: 🌐 Global'
description: 哔哩哔哩：全球模式\n中国站自动线路及全区搜索
compat_arguments:
  ForceHost: '"1"'
  Locales: '"CHN,HKG,TWN"'
  Proxies.CHN: '"DIRECT"'
  Proxies.HKG: '"香港节点"'
  Proxies.MAC: '"澳门节点"'
  Proxies.TWN: '"台湾节点"'
compat_arguments_desc: 'ForceHost: 强制CDN主机名类型\n    ├ 0: IP: 返回远端DNS解析地址（强烈不推荐！严重影响域名分流规则与CDN重定向）\n    ├ 1: HTTP: 返回HTTP域名（推荐，免去重定向时MitM操作）\n    └ 2: HTTPS: 返回HTTPS域名（不推荐，重定向时需对指定域名启用MitM）\n请设置强制返回的CDN主机名类型。\n\nLocales: 启用自动识别与分流功能的地区\n    ├ CHN: 🇨🇳中国大陆\n    ├ HKG: 🇭🇰中国香港\n    ├ MAC: 🇲🇴中国澳门\n    └ TWN: 🇹🇼中国台湾\n请选择启用自动识别与分流功能的地区。\n\nProxies.CHN: [🇨🇳中国大陆] 代理策略名称\n请填写此地区的代理或策略组名称。\n\nProxies.HKG: [🇭🇰中国香港] 代理策略名称\n请填写此地区的代理或策略组名称。\n\nProxies.MAC: [🇲🇴中国澳门] 代理策略名称\n请填写此地区的代理或策略组名称。\n\nProxies.TWN: [🇹🇼中国台湾] 代理策略名称\n请填写此地区的代理或策略组名称。\n'
open_url: http://boxjs.com/#/app/BiliBili.Global
author: VirgilClyne[https://github.com/VirgilClyne]
homepage: https://Global.BiliUniverse.io
icon: https://github.com/BiliUniverse/Global/raw/main/src/assets/icon_rounded.png
