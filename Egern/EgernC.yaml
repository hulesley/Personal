allow_external_connections: true
vif_only: true
geoip_db_url: https://github.com/Masaiki/GeoIP2-CN/raw/release/Country.mmdb
asn_db_url: https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-ASN.mmdb
proxy_latency_test_url: http://detectportal.firefox.com/success.txt
direct_latency_test_url: http://www.apple.com/library/test/success.html
include_all_networks: false
include_cellular_services: false
dns:
  bootstrap:
  - 119.29.29.29
  - 233.5.5.5
  upstreams:
    Secure DNS:
    - https://dns.alidns.com/dns-query
  forward:
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
      value: system
  - wildcard:
      match: '*'
      value: Secure DNS
  hosts:
    dot.pub: 1.12.12.12
    dns.alidns.com: 223.5.5.5
    doh.pub: 1.12.12.12
  public_ip_lookup_url: https://ifconfig.me/ip
policy_groups:
- external:
    name: 手动选择
    type: select
    urls:
    - 这里改成你自己的1机场https:
    - 这里改成你自己的2机场https:
    - 这里改成你自己的3机场https:
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png
    hidden: false
- select:
    name: 国外网站
    policies:
    - 香港节点
    - 美国节点
    - 狮城节点
    - 日本节点
    - 台湾节点
